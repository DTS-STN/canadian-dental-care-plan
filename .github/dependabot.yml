# @see https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
    groups:
      dev-minor-versions:
        dependency-type: development
        update-types:
          - minor
          - patch
        patterns:
          - '*'
        exclude-patterns:
          - 'react-router'
          - '@react-router/*'
      prod-minor-versions:
        dependency-type: production
        update-types:
          - minor
          - patch
        patterns:
          - '*'
        exclude-patterns:
          - 'react-router'
          - '@react-router/*'
      react-router-versions:
        update-types:
          - minor
          - patch
        patterns:
          - 'react-router'
          - '@react-router/*'

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    # Ignore major updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: /infrastructure
    schedule:
      interval: weekly
      day: monday
