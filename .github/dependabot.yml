# @see https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      dev-minor-versions:
        dependency-type: development
        update-types:
          - minor
          - patch
        patterns:
          - "*"
        exclude-patterns:
          - "react-router"
          - "@react-router/*"
      prod-minor-versions:
        dependency-type: production
        update-types:
          - minor
          - patch
        patterns:
          - "*"
        exclude-patterns:
          - "react-router"
          - "@react-router/*"
      react-router-versions:
        update-types:
          - minor
          - patch
        patterns:
          - "react-router"
          - "@react-router/*"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    # Ignore major updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: /infrastructure
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
