apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  annotations:
    # reload the pod whenever the secrets change
    secret.reloader.stakater.com/auto: "true"
spec:
  replicas: 3
  serviceName: redis-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    #
    # pin all versions to v8.8
    #
    spec:
      initContainers:
        - name: init
          image: docker.io/redis:8.8
      containers:
        - name: redis
          image: docker.io/redis:8.8
        - name: redis-sentinel
          image: docker.io/redis:8.8
