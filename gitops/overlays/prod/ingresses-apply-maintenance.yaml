# This file defines ingress resources that put the online application into "maintenance mode".
#
# To enable maintenance mode, reference this file in kustomization.yaml.
# This will route traffic for the online application to the maintenance and OAuth proxy services,
# while preserving access to the allowed routes.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  labels:
    app.kubernetes.io/name: frontend
spec:
  ingressClassName: nginx
  tls:
    # TLS secret `wildcardservicecanadaca` is provisioned out-of-band by the prod
    # cluster platform (e.g., shared certificate management) and is not managed
    # in this repo.
    - secretName: wildcardservicecanadaca
      hosts:
        - srv024.service.canada.ca
  rules:
    - host: srv024.service.canada.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
          - path: /.+/(apply|demander)(/.+)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: maintenance
                port:
                  name: http

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-internal
  labels:
    app.kubernetes.io/name: frontend
  annotations:
    # nginx.ingress.kubernetes.io/proxy-body-size: 100m # required for document uploads, but not needed before June 2026
    nginx.ingress.kubernetes.io/proxy-buffer-size: 32k # required for OAuth proxy
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
    # TLS secret `proddpinternaldtsstncom` is provisioned out-of-band by the prod
    # cluster platform (e.g., shared certificate management) and is not managed
    # in this repo.
    - secretName: proddpinternaldtsstncom
      hosts:
        - canada-dental-care-plan.prod-dp-internal.dts-stn.com
  rules:
    - host: canada-dental-care-plan.prod-dp-internal.dts-stn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
          - path: /.+/(apply|demander)(/.+)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  name: oauth-proxy