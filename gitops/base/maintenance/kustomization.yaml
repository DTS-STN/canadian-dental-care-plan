apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: canada-dental-care-plan
resources:
  - ./deployments.yaml
  - ./services.yaml
configMapGenerator:
  - name: maintenance
    files:
      - ./configs/503.html
      - ./configs/config.conf
    literals:
      - startTimeEn=January 1, 2000, at 12:00 a.m.
      - startTimeFr=1 janvier 2000 à 00 h 00
      - endTimeEn=January 1, 2000, at 12:00 a.m. (EST)
      - endTimeFr=1 janvier 2000 à 00 h 00 (HNE)
